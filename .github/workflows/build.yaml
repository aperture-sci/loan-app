name: Build containers

on:
  push:
    branches:
      - main
    paths:
      - accounts/**
      - interest/**
      - loan/**
      - membership/**
      - orders/**
  workflow_dispatch:

jobs:
  # Detect which service directories changed in this push
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            accounts: accounts/**
            interest: interest/**
            loan: loan/**
            membership: membership/**
            orders: orders/**

  build:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    defaults:
      run:
        working-directory: ./${{ matrix.service }}
    env:
      # Recommended to use GitHub secrets for sensitive information
      OCTOPUS_URL: ${{ vars.OCTOPUS_SERVER_URL }}
      OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
      OCTOPUS_SPACE: ${{ vars.OCTOPUS_SPACE }}
      OCTOPUS_PROJECT: ${{ matrix.service }}

    steps:
    - uses: actions/checkout@v6

    - name: Set Version
      run: echo "PACKAGE_VERSION=$(date +'%Y.%m.%d').$GITHUB_RUN_NUMBER" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: 'aperturesci'
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build the Docker image
      run: >
        docker buildx build --platform 'linux/amd64,linux/arm64' \
          --tag aperturesci/${{ matrix.service }}:${{ env.PACKAGE_VERSION }} \
          --push .

    #
    # Does not support <laurent.rochette@codefresh.io>
    #
    # - name: Push build information to Octopus Deploy
    #   uses: OctopusDeploy/push-build-information-action@v4
    #   with:
    #     packages: |
    #       aperturesci/${{ matrix.service }}
    #     version: ${{ env.PACKAGE_VERSION }}

    - name: Create Octopus Deploy Release
      uses: OctopusDeploy/create-release-action@v4
      with:
        project: ${{ env.OCTOPUS_PROJECT }}
        channel: "Default"
        release_number: ${{ env.PACKAGE_VERSION }}
        package_version: ${{ env.PACKAGE_VERSION }}
        git_ref: 'main' # for the OD project under Version control

    # - name: Deploy the release
    #   uses: OctopusDeploy/deploy-release-action@v4
    #   with:
    #     project: ${{ env.OCTOPUS_PROJECT }}
    #     release_number: ${{ env.PACKAGE_VERSION }}
    #     environments: |
    #       Development
